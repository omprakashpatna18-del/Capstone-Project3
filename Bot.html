<head>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #06000f;
    --accent: #b46fff;
    --accent2: #5ee7ff;
    --accent3: #ff6eb4;
    --text: #f0e6ff;
    --muted: #9b84b8;
    --border: rgba(180,100,255,0.2);
    --card: rgba(255,255,255,0.05);
  }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 40px;
    position: relative;
    overflow-x: hidden;
  } 
 .b { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
  .b1 { width:500px;height:500px;background:rgba(139,60,255,0.3);top:-150px;left:-150px;animation:bl 12s ease-in-out infinite alternate; }
  .b2 { width:350px;height:350px;background:rgba(56,189,248,0.18);bottom:-100px;right:-100px;animation:bl 9s ease-in-out infinite alternate-reverse; }
  .b3 { width:250px;height:250px;background:rgba(244,114,182,0.15);top:50%;left:60%;animation:bl 11s ease-in-out infinite alternate; }
  @keyframes bl { to { transform: translate(25px,20px) scale(1.08); } }
 
  /* ── NAVBAR ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(6,0,15,0.7);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: left;
  }

  .nav-links {
    display: flex;
    gap: 20px;
    list-style: none;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--text); }
 .btn {
    margin-top: 4px;
    width: 100%;
    padding: 14px;
    border: 1px solid rgba(192,132,252,0.5);
    border-radius: 14px;
    background: linear-gradient(135deg, #7c3aed, #a855f7 50%, #0ea5e9);
    background-size: 200% 200%;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 8px rgba(192,132,252,0.4),
      inset 0 0 8px rgba(192,132,252,0.15);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: gradShift 4s ease infinite;
  }
  
  .glass-card {
    background: var(--card);
    color:var(--text);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px;
    box-shadow:
    0 0 20px rgba(180,100,255,0.6);
    

    position: relative;
    z-index: 1;
    margin: 30px auto;
    width: 80vw;
    height: 75vh;
    max-width: 700px;
  }
  .container h2 {
  color: white;
  font-size: 22px;
  font-weight: 700;
  text-align:left;
}
  .container {
  display: flex;
  flex-direction:column;
  justify-content: center;
  align-items: center;
  height: 100vh;
  }
  .simple-select {
  background: white;
  color: black;
  border: none;
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
  outline: none;
  align-self: flex-start; /* ✅ left aligned */
  margin-bottom: 12px;    /* ✅ space between select and card */
}
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 30px 24px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    margin-top: 20px;
  }

  footer span {
    color: var(--accent);
  }
</style>
</head>

  </ul>

  </ul>
</nav>
<div class="b b1"></div>
<div class="b b2"></div>
<div class="b b3"></div>

<h2 style="color: white; margin-top: 20px;"><i>Ask Saraswati Anything...</i></h2>

<div class="glass-card" style="height: auto; min-height: 200px; margin-top: 10px;">
    <input type="text" id="question" placeholder="Type here..." 
           style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: rgba(255,255,255,0.1); color: white;">
    
    <button class="btn" onclick="answer()" style="margin-top: 15px;">Answer</button>

    <div id="ai-response" style="margin-top: 20px; padding: 10px; color: var(--accent2); font-weight: 500;">
        </div>
</div>

<script>
const BACKEND_URL = "https://capstone-project-3-vu1u.onrender.com";

async function answer() {
    const q = document.getElementById("question").value;
    const resBox = document.getElementById("ai-response");

    if(!q) return alert("Please ask something.");

    resBox.innerText = "Thinking..."; // Loading message

    try {
        const response = await fetch(`${BACKEND_URL}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ "question": q}) 
        });

        const data = await response.json();
        
        
        resBox.innerText = data.reply || "No answer found.";

    } catch (err) {
        resBox.innerText = "Error: Connection failed.";
    }
}
</script>


<footer>
