<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Performance Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #06000f;
        --accent: #b46fff;
        --accent2: #5ee7ff;
        --accent3: #ff6eb4;
        --text: #f0e6ff;
        --muted: #9b84b8;
        --border: rgba(180, 100, 255, 0.2);
        --card: rgba(255, 255, 255, 0.05);
      }

      body {
        font-family: "Poppins", sans-serif;
        background: var(--bg);
        background-image: url(10.png);
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        min-height: 100vh;
        display: flex;
        align-items: center;
        flex-direction: column;
        padding: 0 16px 40px;
        position: relative;
        overflow-x: hidden;
      }

      /* ── NAVBAR ── */

      /* ── NAV ── */
      nav {
        width: 100%;
        max-width: 600px;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 0 14px;
        border-bottom: 1px solid var(--border);
        background-color: var(--bg);
        position: sticky;
        top: 0;
        z-index: 10;
        border-radius: 20px;
        margin: 30px 10px 30px 10px;
        border: 5px solid firebrick;
        box-shadow: 0px 0 60px rgb(160, 2, 134);
        padding: 10px 30px;
      }

      .nav-logo {
        font-size: 13px;
        font-weight: 700;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.3px;
      }

      .nav-links {
        display: flex;
        gap: 18px;
        list-style: none;
      }
      .nav-links a {
        color: var(--muted);
        text-decoration: none;
        font-size: 12px;
        font-weight: 500;
        transition: color 0.2s;
      }
      .nav-links a:hover {
        color: lawngreen;
      }
      .chart-container {
        background: var(--bg);
        padding: 20px;
        margin: 40px;
        border-radius: 10px;
        box-shadow: 0 0 20px lawngreen;
      }
    
       h2{ 
        text-align: center;
        color: red;
        background: var(--bg);
        padding: 5px;
        border-radius: 20px;
        width: 300px;
        border-radius: 5px solid red;
        box-shadow: 0 0 40px solid red;
     }
      .footer {
        position: relative;
        z-index: 1;
        width: 100vh;
        text-align: center;
        margin: 30px 10px 10px 60px;
        border-bottom: 10px solid red;
        padding: 10px 10px;
        border-top: 1px solid var(--border);
        font-size: 15px;
        font-weight: bold;
        color: red;
        background-color: var(--bg);
        border-radius: 20px;
        font-family: 'Poppins' , sans-serif;
      }

      .footer span {
        color: var(--accent);
        font-size: 20px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <nav>
      <div class="nav-logo">✦ Saraswati AcadBoost</div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="predict.html">Predictor</a></li>
        <li><a href="AI mentor advice.html">Suggestions</a></li>
        <li><a href="Chart.html">Dashboard</a></li>
        <li><a href="Index.html">Get your timetable</a></li>
        <li><a href="goal.html">Set your goal</a></li>
        <li><a href="Bot.html">Ask Me</a></li>
      </ul>
    </nav>
    <div class="h2">
    <h2>Your Performance Dashboard</h2>
    </div>
    <div class="dashboard-grid">
      <div class="chart-container">
        <canvas id="marksChart"></canvas>
      </div>

      <div class="chart-container">
        <canvas id="sleepChart"></canvas>
      </div>

      <div class="chart-container">
        <canvas id="studyChart"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="attendanceChart"></canvas>
      </div>
    </div>

    <script>
      // --- DATA HANDLING ---
      // Hardcoded Averages
      const avgData = {
        marks: 62.513,
        sleep: 7.008,
        study: 4.007,
        attendance: 70.017,
      };

      // Fetching User Data from localStorage (Fallback to default if empty)
      const userData = {
        marks: parseFloat(localStorage.getItem("predicted_marks")) || 60,
        sleep: parseFloat(localStorage.getItem("p_sleep")) || 7,
        study: parseFloat(localStorage.getItem("p_study")) || 4,
        attendance: parseFloat(localStorage.getItem("p_attendance")) || 70,
      };

      // --- CHART 1: MARKS (DOUGHNUT) ---
      new Chart(document.getElementById("marksChart"), {
        type: "doughnut",
        data: {
          labels: ["Your Marks", "Average Marks"],
          datasets: [
            {
              data: [userData.marks, avgData.marks],
              backgroundColor: ["#36A2EB", "#E0E0E0"],
              borderWidth: 2,
            },
          ],
        },
        options: {
          plugins: {
            title: { display: true, text: "Predicted vs Average Marks" },
          },
        },
      });

      // --- CHART 2: SLEEP (POLAR AREA) ---
      new Chart(document.getElementById("sleepChart"), {
        type: "polarArea",
        data: {
          labels: ["Your Sleep", "Average Sleep"],
          datasets: [
            {
              data: [userData.sleep, avgData.sleep],
              backgroundColor: [
                "rgba(255, 159, 64, 0.6)",
                "rgba(75, 192, 192, 0.6)",
              ],
            },
          ],
        },
        options: {
          plugins: { title: { display: true, text: "Sleep Hours Comparison" } },
        },
      });

      // --- CHART 3: STUDY (HORIZONTAL BAR) ---
      new Chart(document.getElementById("studyChart"), {
        type: "bar",
        data: {
          labels: ["Study Hours"],
          datasets: [
            {
              label: "You",
              data: [userData.study],
              backgroundColor: "#9966FF",
            },
            {
              label: "Average",
              data: [avgData.study],
              backgroundColor: "#C9CBCF",
            },
          ],
        },
        options: {
          indexAxis: "y",
          plugins: { title: { display: true, text: "Daily Study Hours" } },
          scales: { x: { beginAtZero: true } },
        },
      });

      // --- CHART 4: ATTENDANCE (GAUGE STYLE) ---
      new Chart(document.getElementById("attendanceChart"), {
        type: "bar",
        data: {
          labels: ["Attendance"],
          datasets: [
            {
              label: "You",
              data: [userData.attendance],
              backgroundColor: "#2ecc71",
            },
            {
              label: "Average",
              data: [avgData.attendance],
              backgroundColor: "#E0E0E0",
            },
          ],
        },
        options: {
          plugins: {
            title: { display: true, text: "Attendance vs Average" },
          },
          scales: {
            y: { beginAtZero: true, max: 100 },
          },
        },
      });
    </script>
    <div class="footer">
      Built with ♥ .<span>Saraswati AcadBoost</span> . AI-Powered Education
    </div>
  </body>
</html>
