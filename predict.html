          <div class="field6">
            <label>Study Hours</label>

            <label>Sleep Hours</label>

    <script>
      const BACKEND_URL = "https://capstone-project-3-vu1u.onrender.com";

      async function submitForm() {
        const student_id = document.querySelector(".field1 input").value;
        if (!student_id || student_id.trim() === "") {
          alert("Student ID cannot be empty!");
          return;
        }
        const studytime = Number(document.querySelector(".field6 input").value);

        if (studytime > 15 || studytime < 0) {
          alert("Invalid input! Study Hours must be between 0 and 15.");
          return;
        }
        if (!studytime) {
          alert("Please don't left Study Hours Box empty!");
          return;
        }

        const sleeptime = Number(document.querySelector(".field7 input").value);

        if (sleeptime > 10 || sleeptime < 0) {
          alert("Invalid input! Sleep Hours must be between 0 and 10.");
          return;
        }

        if (!sleeptime) {
          alert("Please don't left Sleeptime Box empty!");
          return;
        }
        const attendance = Number(
          document.querySelector(".field8 input").value,
        );

        if (!attendance) {
          alert("Please don't left Attendance Box empty!");
          return;
        }

        if (attendance > 100 || attendance < 0) {
          alert("Invalid input! Attendance must be between 0 and 100.");
          return;
        }
        const totalHours = studytime + sleeptime;

        if (totalHours > 24 || totalHours < 0) {
          alert(
            "Invalid input! Sum of Study Hours and Sleep Hours must be between 0 and 24.",
          );
          return;
        }

        const inputs = document.querySelectorAll(
          ".field1 input,.field1 select,.field2 input,.field2 select,.field3 input,.field3 select,.field4 input,.field4 select,.field5 input,.field5 select,.field6 input,.field6 select,.field7 input,.field7 select,.field8 input,.field8 select,.field9 input,.field9 select,.field10 input,.field10 select,.field11 input,.field11 select,.field12 input,.field12 select",
        );

        const data = {
          age: parseFloat(inputs[1].value),
          gender: inputs[2].value.toLowerCase(),
          course: inputs[3].value.toLowerCase(),
          study_method: inputs[4].value.toLowerCase(),
          study_hours: parseFloat(inputs[5].value),
          sleep_hours: parseFloat(inputs[6].value),
          class_attendance: parseFloat(inputs[7].value),
          internet_access: inputs[8].value.toLowerCase(),
          sleep_quality: inputs[9].value.toLowerCase(),
          facility_rating: inputs[10].value.toLowerCase(),
          exam_difficulty: inputs[11].value.toLowerCase(),
        };

        alert(
          "Your Artificial Intelligence Mentor is Preparing Your Report...",
        );
        alert("Please Wait For 2 Minute ...");
        // console.log("Data: " + JSON.stringify(data));

        const res = await fetch(`${BACKEND_URL}/predict`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ student_data: data }),
        });

        const result = await res.json();

        alert(" WE APPRECIATE YOUR PATIENCE ...");
        // console.log("Result: " + JSON.stringify(result));  //

        localStorage.setItem("predicted_marks", result.predicted_marks);
        localStorage.setItem("suggestions", result.suggestions);
        localStorage.setItem("p_marks", result.predicted_marks);
        localStorage.setItem("p_study", data.study_hours);
        localStorage.setItem("p_sleep", data.sleep_hours);
        localStorage.setItem("p_attendance", data.class_attendance);
        alert(" THANKS FOR WAITING ...");
        window.location.href = "AI Mentor Advice.html";
      }
    </script>
