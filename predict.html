<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #04000e;
    --accent: #c084fc;
    --accent2: #38bdf8;
    --accent3: #f472b6;
    --text: #f1e8ff;
    --muted: #a78bca;
    --card-bg: rgba(255,255,255,0.05);
    --border: rgba(192,132,252,0.25);
    --field: rgba(255,255,255,0.07);
    --field-border: rgba(192,132,252,0.2);
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 40px;
    position: relative;
    overflow-x: hidden;
  }

  /* Ambient blobs */
  .b { position: fixed; border-radius: 50%; filter: blur(100px); pointer-events: none; z-index: 0; }
  .b1 { width:500px;height:500px;background:rgba(139,60,255,0.3);top:-150px;left:-150px;animation:bl 12s ease-in-out infinite alternate; }
  .b2 { width:350px;height:350px;background:rgba(56,189,248,0.18);bottom:-100px;right:-100px;animation:bl 9s ease-in-out infinite alternate-reverse; }
  .b3 { width:250px;height:250px;background:rgba(244,114,182,0.15);top:50%;left:60%;animation:bl 11s ease-in-out infinite alternate; }
  @keyframes bl { to { transform: translate(25px,20px) scale(1.08); } }

  /* ── NAV ── */
  nav {
    width: 100%;
    max-width: 520px;
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 14px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }

  .nav-brand {
    font-size: 13px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.3px;
  }

  .nav-links { display: flex; gap: 18px; list-style: none; }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    font-weight: 500;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-links a.active { color: var(--accent); }

  /* ── CARD ── */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 36px 30px 32px;
    box-shadow:
      0 0 0 1px rgba(192,132,252,0.08),
      0 0 8px rgba(192,132,252,0.15),
      inset 0 0 8px rgba(192,132,252,0.06),
      0 24px 64px rgba(0,0,0,0.6);
    animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes rise {
    from { opacity:0; transform:translateY(32px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* Top shimmer line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 15%; right: 15%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), var(--accent3), transparent);
    border-radius: 0 0 2px 2px;
    opacity: 0.8;
  }

  /* ── HEADER ── */
  .card-header {
    text-align: center;
    margin-bottom: 28px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(192,132,252,0.1);
    border: 1px solid rgba(192,132,252,0.3);
    border-radius: 30px;
    padding: 5px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--accent);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
    box-shadow: 0 0 8px rgba(192,132,252,0.15), inset 0 0 6px rgba(192,132,252,0.08);
  }

  .badge-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: ping 2s ease-in-out infinite;
  }

  @keyframes ping {
    0%,100% { opacity:1; transform:scale(1); box-shadow:0 0 0 0 rgba(192,132,252,0.5); }
    50% { opacity:0.5; transform:scale(0.7); box-shadow:0 0 0 4px rgba(192,132,252,0); }
  }

  .card-title {
    font-size: 24px;
    font-weight: 800;
    background: linear-gradient(135deg, #fff 20%, var(--accent) 55%, var(--accent2) 90%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    /* Glow effect on heading */
    filter: drop-shadow(0 0 12px rgba(192,132,252,0.4));
    margin-bottom: 6px;
  }

  .card-sub {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
  }

  /* ── FORM ── */
  .form { display: flex; flex-direction: column; gap: 13px; }

  .field { display: flex; flex-direction: column; gap: 5px; }

  .field label {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding-left: 2px;
  }

  input, select {
    width: 100%;
    padding: 11px 14px;
    background: var(--field);
    border: 1px solid var(--field-border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 400;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
  }

  input::placeholder { color: rgba(167,139,202,0.4); }

  input:focus, select:focus {
    border-color: var(--accent);
    background: rgba(192,132,252,0.08);
    box-shadow:
      0 0 0 3px rgba(192,132,252,0.12),
      0 0 12px rgba(192,132,252,0.1);
  }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 13px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 11px;
    pointer-events: none;
  }

  select option { background: #120025; color: var(--text); }

  /* 2 column grid */
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }

  /* Divider */
  .sep {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 2px 0;
  }

  /* ── BUTTON ── */
  .btn {
    margin-top: 4px;
    width: 100%;
    padding: 14px;
    border: 1px solid rgba(192,132,252,0.5);
    border-radius: 14px;
    background: linear-gradient(135deg, #7c3aed, #a855f7 50%, #0ea5e9);
    background-size: 200% 200%;
    color: #fff;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 0 8px rgba(192,132,252,0.4),
      inset 0 0 8px rgba(192,132,252,0.15);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: gradShift 4s ease infinite;
  }

  @keyframes gradShift {
    0%,100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow:
      0 0 16px rgba(192,132,252,0.6),
      inset 0 0 12px rgba(192,132,252,0.2);
  }
  .btn:hover::before { opacity: 1; }
  .btn:active { transform: translateY(0); }

  /* stagger fields */
  .field, .row2 { animation: fIn 0.4s ease both; }
  .field:nth-child(1),.row2:nth-child(1){animation-delay:0.05s}
  .field:nth-child(2),.row2:nth-child(2){animation-delay:0.1s}
  .field:nth-child(3),.row2:nth-child(3){animation-delay:0.15s}
  .field:nth-child(4),.row2:nth-child(4){animation-delay:0.2s}
  .field:nth-child(5),.row2:nth-child(5){animation-delay:0.25s}
  .field:nth-child(6),.row2:nth-child(6){animation-delay:0.3s}
  .field:nth-child(7),.row2:nth-child(7){animation-delay:0.35s}
  .field:nth-child(8),.row2:nth-child(8){animation-delay:0.4s}

  @keyframes fIn {
    from { opacity:0; transform:translateX(-10px); }
    to   { opacity:1; transform:translateX(0); }
  }
</style>

    <script>
      const BACKEND_URL = "https://capstone-project-3-vu1u.onrender.com";

      async function submitForm() {
        const student_id = document.querySelector(".field1 input").value;
        if (!student_id || student_id.trim() === "") {
          alert("Student ID cannot be empty!");
          return;
        }
        const studytime = Number(document.querySelector(".field6 input").value);

        if (studytime > 15 || studytime < 0) {
          alert("Invalid input! Study Hours must be between 0 and 15.");
          return;
        }
        if (!studytime) {
          alert("Please don't left Study Hours Box empty!");
          return;
        }

        const sleeptime = Number(document.querySelector(".field7 input").value);

        if (sleeptime > 10 || sleeptime < 0) {
          alert("Invalid input! Sleep Hours must be between 0 and 10.");
          return;
        }

        if (!sleeptime) {
          alert("Please don't left Sleeptime Box empty!");
          return;
        }
        const attendance = Number(
          document.querySelector(".field8 input").value,
        );

        if (!attendance) {
          alert("Please don't left Attendance Box empty!");
          return;
        }

        if (attendance > 100 || attendance < 0) {
          alert("Invalid input! Attendance must be between 0 and 100.");
          return;
        }
        const totalHours = studytime + sleeptime;

        if (totalHours > 24 || totalHours < 0) {
          alert(
            "Invalid input! Sum of Study Hours and Sleep Hours must be between 0 and 24.",
          );
          return;
        }

        const inputs = document.querySelectorAll(
          ".field1 input,.field1 select,.field2 input,.field2 select,.field3 input,.field3 select,.field4 input,.field4 select,.field5 input,.field5 select,.field6 input,.field6 select,.field7 input,.field7 select,.field8 input,.field8 select,.field9 input,.field9 select,.field10 input,.field10 select,.field11 input,.field11 select,.field12 input,.field12 select",
        );

        const data = {
          age: parseFloat(inputs[1].value),
          gender: inputs[2].value.toLowerCase(),
          course: inputs[3].value.toLowerCase(),
          study_method: inputs[4].value.toLowerCase(),
          study_hours: parseFloat(inputs[5].value),
          sleep_hours: parseFloat(inputs[6].value),
          class_attendance: parseFloat(inputs[7].value),
          internet_access: inputs[8].value.toLowerCase(),
          sleep_quality: inputs[9].value.toLowerCase(),
          facility_rating: inputs[10].value.toLowerCase(),
          exam_difficulty: inputs[11].value.toLowerCase(),
        };

        alert(
          "Your Artificial Intelligence Mentor is Preparing Your Report...",
        );
        alert("Please Wait For 2 Minute ...");
        // console.log("Data: " + JSON.stringify(data));

        const res = await fetch(`${BACKEND_URL}/predict`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ student_data: data }),
        });

        const result = await res.json();

        alert(" WE APPRECIATE YOUR PATIENCE ...");
        // console.log("Result: " + JSON.stringify(result));  //

        localStorage.setItem("predicted_marks", result.predicted_marks);
        localStorage.setItem("suggestions", result.suggestions);
        localStorage.setItem("p_marks", result.predicted_marks);
        localStorage.setItem("p_study", data.study_hours);
        localStorage.setItem("p_sleep", data.sleep_hours);
        localStorage.setItem("p_attendance", data.class_attendance);
        alert(" THANKS FOR WAITING ...");
        window.location.href = "AI Mentor Advice.html";
      }
    </script>
